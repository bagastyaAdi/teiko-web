<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masukan & Saran - Teiko</title>

  <link rel="icon" type="image/png" href="asset/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="navbar.css">

  <style>
    body {
      background-color: #f9fafb;
      font-family: 'Inter', sans-serif;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    body.page-loaded {
      opacity: 1;
    }
    
    /* Ensure content is centered and takes full height */
    main { min-height: 80vh; }

    /* Stagger animation */
    .anim-item {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .anim-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== HERO ===== */
    .feedback-hero {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 72px 0 56px;
      text-align: center;
    }

    .feedback-hero h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: #111;
    }

    .feedback-hero p {
      color: #6b7280;
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0.75rem auto 0;
    }

    /* ===== FORM ===== */
    .feedback-section {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 1.5rem;
    }

    .form-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    .form-card label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    .form-card input,
    .form-card textarea {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      width: 100%;
      transition: border-color 0.2s;
      outline: none;
      font-family: 'Inter', sans-serif;
      background: #f9fafb;
    }

    .form-card input:focus,
    .form-card textarea:focus {
      border-color: #2A3B27;
      background: #fff;
    }

    .form-card textarea {
      min-height: 150px;
      resize: vertical;
    }

    .btn-submit {
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.8rem 2rem;
      font-weight: 600;
      font-size: 0.95rem;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-submit:hover {
      background: #2A3B27;
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .success-msg {
      display: none;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: #15803d;
      font-weight: 500;
      font-size: 0.95rem;
    }

    /* ===== FAQ ===== */
    .faq-section {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem 80px;
    }

    .faq-section h2 {
      font-weight: 800;
      font-size: 1.6rem;
      color: #111;
      margin-bottom: 1.5rem;
    }

    .faq-item {
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 0.75rem;
      overflow: hidden;
      background: #fff;
    }

    .faq-question {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 1.1rem 1.25rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: #111;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
    }

    .faq-question:hover {
      background: #f9fafb;
    }

    .faq-question.open {
      color: #2A3B27;
    }

    .faq-icon {
      font-size: 1.1rem;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .faq-question.open .faq-icon {
      transform: rotate(45deg);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.2s;
      padding: 0 1.25rem;
      color: #4b5563;
      font-size: 0.93rem;
      line-height: 1.7;
    }

    .faq-answer.open {
      max-height: 300px;
      padding: 0 1.25rem 1.1rem;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
</head>

<body>

  <header id="navbar-placeholder"></header>
  <div id="navbar-spacer"></div>

  <!-- Hero Header -->
  <div class="feedback-hero anim-item">
    <h1>Masukan & Saran</h1>
    <p>Ceritakan pengalamanmu dengan Teiko. Setiap masukan sangat berarti bagi kami.</p>
  </div>

  <!-- Form Section -->
  <section class="feedback-section">
    <div class="form-card anim-item">
      <h5 class="fw-bold mb-1" style="color:#111;">Kirim Masukan</h5>
      <p class="text-muted mb-4" style="font-size:0.88rem;">Isi form di bawah dan kami akan membacanya.</p>

      <div class="success-msg" id="success-msg">
        <i class="bi bi-check-circle-fill me-2"></i>Terima kasih! Masukan kamu sudah kami terima. 🙏
      </div>

      <form id="feedback-form">
        <div class="mb-3">
          <label for="fb-email">Alamat Gmail kamu</label>
          <input type="email" id="fb-email" placeholder="contoh@gmail.com" required />
        </div>
        <div class="mb-4">
          <label for="fb-message">Kritik & Saran</label>
          <textarea id="fb-message" placeholder="Ceritakan pengalamanmu, masukan produk, atau saran untuk Teiko..."
            required></textarea>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">
          <i class="bi bi-send me-2"></i>Kirim Masukan
        </button>
      </form>
    </div>
  </section>

  <!-- FAQ Section -->
  <section class="faq-section">
    <h2>Pertanyaan Umum (FAQ)</h2>

    <div id="faq-dynamic-container">
      <!-- FAQ items will be loaded here -->
    </div>
  </section>

  <footer id="footer-placeholder"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="navbar.js" defer></script>
  <script src="footer.js" defer></script>

  <script>
    // FAQ toggle
    function toggleFaq(btn) {
      const answer = btn.nextElementSibling;
      const isOpen = btn.classList.contains('open');
      // Tutup semua
      document.querySelectorAll('.faq-question').forEach(q => {
        q.classList.remove('open');
        q.nextElementSibling.classList.remove('open');
      });
      // Buka yg diklik jika belum terbuka
      if (!isOpen) {
        btn.classList.add('open');
        answer.classList.add('open');
      }
    }

    async function loadFaqFrontend() {
      const container = document.getElementById('faq-dynamic-container');
      try {
        const { data, error } = await sb.from('site_content')
                                        .select('*')
                                        .eq('is_active', true)
                                        .like('id', 'faq_%');
        if (error) throw error;
        
        if (data.length === 0) {
          container.innerHTML = `<p class="text-muted small">Belum ada FAQ saat ini.</p>`;
          return;
        }

        // Sort by ID descending
        data.sort((a,b) => b.id.localeCompare(a.id));

        container.innerHTML = data.map(f => `
          <div class="faq-item anim-item">
            <button class="faq-question" onclick="toggleFaq(this)">
              ${f.title} <i class="bi bi-plus-lg faq-icon"></i>
            </button>
            <div class="faq-answer">
              ${f.subtitle.replace(/\n/g, '<br>')}
            </div>
          </div>
        `).join('');

        // Trigger animation after render
        setTimeout(() => {
          staggerAnimate('#faq-dynamic-container .faq-item', 200, 100);
        }, 50);
      } catch (err) {
        console.error('Error loading FAQ:', err);
      }
    }

    function staggerAnimate(selector, baseDelay, step) {
      document.querySelectorAll(selector).forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), baseDelay + i * step);
      });
    }

    // Form submit
    document.getElementById('feedback-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.textContent = 'Mengirim...';
      btn.disabled = true;

      const email = document.getElementById('fb-email').value.trim();
      const message = document.getElementById('fb-message').value.trim();

      try {
        const { error } = await sb.from('feedback').insert({ email, message });
        if (error) throw error;

        document.getElementById('feedback-form').reset();
        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('feedback-form').style.display = 'none';
      } catch (err) {
        alert('Gagal mengirim masukan. Silakan coba lagi.\n' + err.message);
        btn.innerHTML = '<i class="bi bi-send me-2"></i>Kirim Masukan';
        btn.disabled = false;
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      requestAnimationFrame(() => document.body.classList.add('page-loaded'));

      // Stagger animate: hero → form → faq items
      function staggerAnimate(selector, baseDelay, step) {
        document.querySelectorAll(selector).forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), baseDelay + i * step);
        });
      }

      setTimeout(() => {
        // Hero dan form tampil lebih dulu
        staggerAnimate('.feedback-hero, .form-card', 100, 150);
      }, 50);
      loadFaqFrontend();
    });
  </script>
</body>

</html>
